<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTHWAVE TRON</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <canvas id="minimap"></canvas>

    <div id="hud">
        <div><span class="label">SPEED:</span> <span id="hud-speed" class="value">0</span></div>
        <div><span class="label">BIKE HP:</span> <span id="hud-hp" class="value">100</span></div>
        <div><span class="label">SCORE:</span> <span id="hud-score" class="value">0</span></div>
        <div><span class="label">MODE:</span> <span id="hud-mode" class="value">RIDING</span></div>
        <div id="hud-dismount" class="hidden-hint"><span class="warning">⚠ PRESS E TO DISMOUNT</span></div>
        <div id="hud-mount" class="hidden-hint"><span class="warning">⚠ PRESS E NEAR BIKE TO MOUNT</span></div>
    </div>

    <span id="boost-label">BOOST</span>
    <div id="boost-bar-container"><div id="boost-bar-fill"></div></div>

    <span id="disc-label">DISC</span>
    <div id="disc-bar-container"><div id="disc-bar-fill"></div></div>

    <div id="message-overlay">
        <h1 id="msg-title">SYNTHWAVE TRON</h1>
        <h2 id="msg-subtitle">ENTER THE GRID</h2>
        <p id="msg-text">Press ENTER to start</p>
        <p class="subtitle" id="msg-controls"></p>
    </div>

    <div id="pause-overlay">
        <h1>PAUSED</h1>
        <p>Press ESC to resume</p>
        <div id="pause-buttons">
            <button id="btn-resume" class="pause-btn">RESUME</button>
            <button id="btn-quit" class="pause-btn">QUIT TO MENU</button>
        </div>
        <div id="pause-volume">
            <div class="vol-row">
                <label class="vol-label" for="vol-master">MASTER</label>
                <input type="range" id="vol-master" class="vol-slider" min="0" max="100" value="35">
                <span class="vol-val" id="vol-master-val">35</span>
            </div>
            <div class="vol-row">
                <label class="vol-label" for="vol-music">MUSIC</label>
                <input type="range" id="vol-music" class="vol-slider" min="0" max="100" value="70">
                <span class="vol-val" id="vol-music-val">70</span>
            </div>
            <div class="vol-row">
                <label class="vol-label" for="vol-sfx">SFX</label>
                <input type="range" id="vol-sfx" class="vol-slider" min="0" max="100" value="100">
                <span class="vol-val" id="vol-sfx-val">100</span>
            </div>
        </div>
    </div>

    <div id="controls-help">
        WASD/Arrows: Steer | F/Click: Fire Disc | E: Dismount/Mount | SPACE: Boost | ESC: Pause
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
